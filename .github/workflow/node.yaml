name: Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Deploy
      run: |
        curl -X POST \
        https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }} \
        -H 'Authorization: Bearer ${{ secrets.RENDER_API_KEY }}'